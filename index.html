<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TXT Live Checker & Excel Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 550px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        input[type="file"] {
            display: none;
        }
        .file-label {
            display: inline-block;
            background-color: #e9ecef;
            color: #495057;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
            border: 1px solid #ced4da;
            transition: 0.3s;
            font-weight: 500;
        }
        .file-label:hover {
            background-color: #dde0e3;
        }
        #fileName {
            display: block;
            margin-bottom: 20px;
            font-size: 14px;
            color: #28a745;
            font-weight: bold;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            margin-bottom: 10px;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #a0c4ff;
            cursor: not-allowed;
        }
        .btn-success {
            background-color: #28a745;
            display: none; /* প্রথমে হাইড থাকবে */
        }
        .btn-success:hover {
            background-color: #218838;
        }
        #status {
            margin: 15px 0;
            font-size: 15px;
            font-weight: bold;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            font-size: 14px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #dee2e6;
            display: none;
        }
        .stats span {
            font-weight: bold;
        }
        .active-list-container {
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            border: 1px solid #ced4da;
            padding: 10px;
            border-radius: 5px;
            background: #fafafa;
            display: none;
            margin-bottom: 15px;
        }
        .active-list-container h4 {
            margin: 0 0 10px 0;
            color: #28a745;
            font-size: 14px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }
        .id-item {
            font-family: monospace;
            font-size: 13px;
            padding: 4px 0;
            border-bottom: 1px dashed #eee;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>TXT Live Checker & Excel</h2>
        
        <label for="fileInput" class="file-label">📂 Choose TXT File</label>
        <input type="file" id="fileInput" accept=".txt">
        
        <span id="fileName">No file selected</span>
        
        <button id="liveCheckBtn" disabled>🔍 Live Check IDs</button>
        
        <div id="status"></div>
        <div class="stats" id="statsBox">
            <div style="color: #007bff;">Total: <span id="totalCount">0</span></div>
            <div style="color: #28a745;">Active: <span id="activeCount">0</span></div>
            <div style="color: #dc3545;">Dead: <span id="deadCount">0</span></div>
        </div>

        <div class="active-list-container" id="listContainer">
            <h4>✅ Active ID List:</h4>
            <div id="activeList"></div>
        </div>

        <button id="downloadBtn" class="btn-success">📥 Download Active Excel</button>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileName');
        const liveCheckBtn = document.getElementById('liveCheckBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusDisplay = document.getElementById('status');
        const statsBox = document.getElementById('statsBox');
        const totalCountSpan = document.getElementById('totalCount');
        const activeCountSpan = document.getElementById('activeCount');
        const deadCountSpan = document.getElementById('deadCount');
        const listContainer = document.getElementById('listContainer');
        const activeListDiv = document.getElementById('activeList');

        let selectedFile = null;
        let activeAccountsData = []; // শুধুমাত্র Active আইডিগুলো এখানে জমা থাকবে

        // ফাইল সিলেক্ট করার সময়
        fileInput.addEventListener('change', function(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                fileNameDisplay.textContent = "Selected: " + selectedFile.name;
                liveCheckBtn.disabled = false;
                resetUI();
            } else {
                fileNameDisplay.textContent = "No file selected";
                liveCheckBtn.disabled = true;
            }
        });

        // UI রিফ্রেশ করার ফাংশন
        function resetUI() {
            statusDisplay.textContent = "";
            statsBox.style.display = "none";
            listContainer.style.display = "none";
            downloadBtn.style.display = "none";
            activeListDiv.innerHTML = "";
            activeAccountsData = [];
        }

        // লাইভ চেকিং লজিক (এখানে আপনার আসল API কল বসাতে পারেন)
        async function checkAccountValidity(uid, password, cookies) {
            return new Promise((resolve) => {
                // টেস্টিংয়ের জন্য সিম্যুলেশন: UID ও Password থাকলে এবং কুকিজ ভ্যালিড মনে হলে Active ধরা হচ্ছে
                // আসল লাইভ চেকের জন্য এখানে fetch() দিয়ে আপনার API এ রিকোয়েস্ট পাঠাতে পারেন
                setTimeout(() => {
                    const isValid = uid.length > 3 && password.length > 0 && cookies.length > 5;
                    resolve(isValid);
                }, 50); // ছোট ডিলে দেওয়া হয়েছে যাতে লাইভ চেকের ফিলিংস আসে
            });
        }

        // Live Check বাটনে ক্লিক করলে
        liveCheckBtn.addEventListener('click', function() {
            if (!selectedFile) return;

            resetUI();
            liveCheckBtn.disabled = true;
            statusDisplay.textContent = "⏳ Reading & Checking IDs...";
            statusDisplay.style.color = "#007bff";

            const reader = new FileReader();

            reader.onload = async function(e) {
                const text = e.target.result;
                const lines = text.split('\n');
                
                let total = 0;
                let active = 0;
                let dead = 0;

                statsBox.style.display = "flex";
                listContainer.style.display = "block";

                for (let line of lines) {
                    line = line.trim();
                    
                    // অপ্রয়োজনীয় লাইন বা হেডার বাদ দেওয়া
                    if (!line || line.startsWith('=') || line.startsWith('Machine') || line.startsWith('Total') || line.startsWith('Date')) {
                        continue;
                    }

                    const parts = line.split(':');
                    
                    if (parts.length >= 3) {
                        total++;
                        totalCountSpan.textContent = total;

                        const uid = parts[0].trim();
                        const password = parts[1].trim();
                        const cookies = parts.slice(2).join(':').trim(); 

                        // আইডি লাইভ চেক করা হচ্ছে
                        const isActive = await checkAccountValidity(uid, password, cookies);

                        if (isActive) {
                            active++;
                            activeCountSpan.textContent = active;
                            
                            // Active ডেটা লিস্টে এবং অ্যারেতে সেভ করা
                            activeAccountsData.push([uid, password, cookies]);

                            const idElement = document.createElement('div');
                            idElement.className = 'id-item';
                            idElement.textContent = `✔ ${uid}`;
                            activeListDiv.appendChild(idElement);
                            activeListDiv.scrollTop = activeListDiv.scrollHeight; // অটো স্ক্রল ডাউন
                        } else {
                            dead++;
                            deadCountSpan.textContent = dead;
                        }
                    }
                }

                liveCheckBtn.disabled = false;

                if (activeAccountsData.length > 0) {
                    statusDisplay.textContent = `✔ Check Completed! Found ${active} Active IDs.`;
                    statusDisplay.style.color = "green";
                    downloadBtn.style.display = "inline-block"; // ডাউনলোড বাটন দেখানো হবে
                } else {
                    statusDisplay.textContent = "❌ No active IDs found!";
                    statusDisplay.style.color = "red";
                }
            };

            reader.onerror = function() {
                statusDisplay.textContent = "Error reading file.";
                statusDisplay.style.color = "red";
                liveCheckBtn.disabled = false;
            };

            reader.readAsText(selectedFile);
        });

        // Download Excel বাটনে ক্লিক করলে
        downloadBtn.addEventListener('click', function() {
            if (activeAccountsData.length === 0) return;

            // এক্সেলের জন্য হেডার তৈরি
            const excelData = [['UID', 'Password', 'Cookies'], ...activeAccountsData];

            // নতুন ওয়ার্কবুক ও শিট তৈরি
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(excelData);

            XLSX.utils.book_append_sheet(wb, ws, "Active_Accounts");

            // শুধুমাত্র Active আইডিগুলোর এক্সেল ফাইল ডাউনলোড
            XLSX.writeFile(wb, "Active_IDs_Only.xlsx");
        });
    </script>
</body>
</html>
